<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine Quality Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-center mb-4">Wine Quality Prediction</h2>

            <form action="/predict" method="POST">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Fixed Acidity</label>
                  <input type="number" step="any" class="form-control" name="fixed_acidity" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Volatile Acidity</label>
                  <input type="number" step="any" class="form-control" name="volatile_acidity" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Citric Acid</label>
                  <input type="number" step="any" class="form-control" name="citric_acid" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Residual Sugar</label>
                  <input type="number" step="any" class="form-control" name="residual_sugar" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Chlorides</label>
                  <input type="number" step="any" class="form-control" name="chlorides" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Free Sulfur Dioxide</label>
                  <input type="number" step="any" class="form-control" name="free_sulfur_dioxide" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Total Sulfur Dioxide</label>
                  <input type="number" step="any" class="form-control" name="total_sulfur_dioxide" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Density</label>
                  <input type="number" step="any" class="form-control" name="density" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">pH</label>
                  <input type="number" step="any" class="form-control" name="pH" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Sulphates</label>
                  <input type="number" step="any" class="form-control" name="sulphates" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Alcohol</label>
                  <input type="number" step="any" class="form-control" name="alcohol" required>
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-danger btn-lg">Predict Quality</button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
